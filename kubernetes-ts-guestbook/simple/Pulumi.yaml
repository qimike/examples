name: guestbook
runtime: nodejs
description: Kubernetes Guestbook example based on https://kubernetes.io/docs/tutorials/stateless-application/guestbook/
template:
  config:
    isMinikube:
      description: Whether you are deploying to minikube
      default: true
    grafanaServiceType:
      description: Grafana service type (LoadBalancer or NodePort)
      default: LoadBalancer
    nodeIp:
      description: Node IP used to construct Grafana URL when using NodePort
